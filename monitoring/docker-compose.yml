services:
  # האפליקציה שלך
  trivia-app:
    build: .
    image: ghcr.io/${GITHUB_USERNAME}/trivia-game:latest # נתיב ל-Registry של גיטהב
    container_name: trivia_game
    stdin_open: true # מאפשר קלט מהמקלדת (בשביל לשחק)
    tty: true        # מאפשר צבעים בטרמינל
    ports:
      - "8000:8000"
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - trivia_game
    networks:
      - monitoring

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge